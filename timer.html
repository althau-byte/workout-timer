<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Workout Timer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Telegram WebApp JS -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    #time {
      font-size: 72px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .ring {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 10px solid #333;
      position: relative;
      margin-bottom: 30px;
    }

    .fill {
      position: absolute;
      top: 0;
      left: 0;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00ff88, #00d46a);
      clip-path: inset(0 0 100% 0);
      transition: clip-path 1s linear;
    }

    #done {
      display: none;
      font-size: 28px;
      font-weight: 600;
      margin-top: 20px;
      color: #00ff88;
    }
  </style>
</head>

<body>

  <div id="time">--:--</div>

  <div class="ring">
    <div class="fill" id="fill"></div>
  </div>

  <div id="done">Workout Complete</div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let duration = null;

    // 1. Telegram start_param
    if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
      duration = parseInt(tg.initDataUnsafe.start_param);
    }

    // 2. Browser fallback
    if (!duration) {
      const params = new URLSearchParams(window.location.search);
      duration = parseInt(params.get("duration"));
    }

    // 3. Default
    if (!duration || isNaN(duration)) duration = 60;

    let remaining = duration;

    const timeEl = document.getElementById("time");
    const fillEl = document.getElementById("fill");
    const doneEl = document.getElementById("done");

    function format(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${s.toString().padStart(2, "0")}`;
    }

    function update() {
      timeEl.textContent = format(remaining);

      const pct = 1 - remaining / duration;
      const clip = 100 - pct * 100;
      fillEl.style.clipPath = `inset(${clip}% 0 0 0)`;

      if (remaining <= 0) {
        doneEl.style.display = "block";
        tg.HapticFeedback.notificationOccurred("success");
        return;
      }

      remaining -= 1;
      setTimeout(update, 1000);
    }

    update();
  </script>

</body>
</html>
